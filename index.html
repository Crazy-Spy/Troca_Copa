<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tinder Stickers</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Tinder Stickers ⚽</h1>
        <button id="btn-admin-nav" class="admin-link">⚙️ Admin</button>
    </header>

    <main class="container">
        <!-- Section: User Input -->
        <section id="input-section" class="card">
            <h2>Suas Figurinhas</h2>
            <p class="subtitle">Insira seu nome e cole suas listas de repetidas e faltantes.</p>

            <div class="form-group">
                <label for="username">Seu Nome:</label>
                <input type="text" id="username" placeholder="Ex: João da Silva" required>
            </div>

            <div class="form-group row-group">
                <div class="half-width">
                    <label for="predio">Prédio:</label>
                    <select id="predio" required>
                        <option value="CE">CE</option>
                        <option value="SEC">SEC</option>
                    </select>
                </div>
                <div class="half-width">
                    <label for="andar">Andar:</label>
                    <input type="number" id="andar" placeholder="Ex: 5" required>
                </div>
            </div>

            <div class="form-group">
                <label for="stickers-faltantes">Faltantes:</label>
                <textarea id="stickers-faltantes" rows="5" placeholder="Cole aqui as figurinhas que você PRECISA..."></textarea>
            </div>

            <div class="form-group">
                <label for="stickers-repetidas">Repetidas:</label>
                <textarea id="stickers-repetidas" rows="5" placeholder="Cole aqui as figurinhas que você TEM PRA TROCAR..."></textarea>
            </div>

            <button id="btn-save" class="btn-primary">Salvar e Buscar Matches</button>
            <div id="status-message" class="hidden"></div>
        </section>

        <!-- Section: Matches -->
        <section id="matches-section" class="card hidden">
            <h2>Seus Matches 🤝</h2>
            <div id="matches-container">
                <!-- Matches will be injected here -->
            </div>
            <button id="btn-back" class="btn-secondary">Voltar / Atualizar Lista</button>
        </section>

        <!-- Section: Admin -->
        <section id="admin-section" class="card hidden">
            <h2>Administração</h2>
            <p class="subtitle">Lista de todos os usuários cadastrados. Cuidado ao deletar!</p>
            <div id="admin-users-container">
                <!-- Admin users will be injected here -->
            </div>
            <button id="btn-admin-back" class="btn-secondary">Voltar</button>
        </section>
    </main>

    <!-- Include Parser and App logic -->
    <script src="parser.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
